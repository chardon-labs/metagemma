<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Confidence Test UI</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="controls" aria-label="Request controls">
        <div class="field">
          <label for="endpoint">Endpoint</label>
          <input id="endpoint" value="http://127.0.0.1:8010/complete/stream" />
        </div>

        <div class="field">
          <label for="prompt">Prompt</label>
          <textarea id="prompt" rows="8">What is 2 + 2? Answer briefly.</textarea>
        </div>

        <div class="grid">
          <div class="field">
            <label for="maxTokens">Max tokens</label>
            <input id="maxTokens" type="number" min="1" max="2048" value="128" />
          </div>
          <div class="field">
            <label for="temperature">Temperature</label>
            <input id="temperature" type="number" min="0" max="2" step="0.05" value="0.7" />
          </div>
          <div class="field">
            <label for="topP">Top p</label>
            <input id="topP" type="number" min="0.01" max="1" step="0.01" value="0.95" />
          </div>
          <label class="check">
            <input id="thinking" type="checkbox" checked />
            <span>Thinking</span>
          </label>
        </div>

        <div class="actions">
          <button id="run" type="button">Run</button>
          <button id="stop" type="button" disabled>Stop</button>
        </div>
      </section>

      <section class="results" aria-label="Response">
        <header class="statusbar">
          <div>
            <span id="status" class="status">Idle</span>
            <span id="tokenCount" class="muted">0 tokens</span>
          </div>
          <div class="metric">
            <span class="muted">Final</span>
            <strong id="finalConfidence">-</strong>
          </div>
          <div class="metric">
            <span class="muted">Mean</span>
            <strong id="meanConfidence">-</strong>
          </div>
        </header>

        <canvas id="chart" width="960" height="260" aria-label="Confidence chart"></canvas>
        <pre id="completion" class="completion"></pre>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
